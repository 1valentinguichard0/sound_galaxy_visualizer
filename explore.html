<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUNDZ — Explorer les galaxies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #06040F; --white: #E8E0FF;
  --violet: #7B2FFF; --cyan: #00CFFF;
  --indigo: #3D00CC; --magenta: #BF00FF;
  --green: #00FF9F;
  --display: 'Bebas Neue', sans-serif;
  --cond: 'Barlow Condensed', sans-serif;
  --mono: 'Share Tech Mono', monospace;
}
body { background: var(--bg); color: var(--white); font-family: var(--cond); min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
  pointer-events: none; z-index: 9998;
}

/* ── NAV ── */
nav {
  height: 56px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 32px;
  border-bottom: 1px solid rgba(123,47,255,0.2);
  background: rgba(6,4,15,0.9); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
  gap: 16px;
}
.nav-left { display: flex; align-items: center; gap: 24px; flex-shrink: 0; }
.nav-logo { font-family: var(--display); font-size: 22px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-decoration: none; }
.nav-right { display: flex; gap: 12px; align-items: center; }
.nav-link { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(232,224,255,0.4); text-decoration: none;
  transition: color .15s; }
.nav-link:hover { color: var(--cyan); }
.nav-user { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
  color: rgba(232,224,255,0.4); }
.btn-sm { padding: 6px 16px; font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
  text-decoration: none; transition: .15s; border-radius: 0; }
.btn-outline { background: transparent; border: 1px solid rgba(123,47,255,0.4);
  color: rgba(232,224,255,0.6); }
.btn-outline:hover { border-color: var(--violet); color: var(--white); }
.btn-fill { background: var(--violet); border: 1px solid var(--violet); color: var(--white); }
.btn-fill:hover { background: #9B4FFF; }

/* ── MAIN ── */
main { max-width: 1200px; margin: 0 auto; padding: 48px 40px; }

/* ── HEADER ── */
.page-header { margin-bottom: 36px; }
.page-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em;
  color: var(--cyan); text-transform: uppercase; margin-bottom: 8px; }
.page-title { font-family: var(--display); font-size: clamp(36px, 5vw, 64px);
  line-height: 0.9; color: var(--white); margin-bottom: 6px; }
.page-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  color: rgba(232,224,255,0.3); }

/* ── FILTERS ── */
.filters {
  display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; align-items: center;
}
.filter-btn {
  padding: 6px 16px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.14em; text-transform: uppercase;
  background: transparent; border: 1px solid rgba(232,224,255,0.12);
  color: rgba(232,224,255,0.4); cursor: pointer; transition: .15s;
}
.filter-btn:hover { border-color: rgba(123,47,255,0.5); color: rgba(232,224,255,0.7); }
.filter-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,207,255,0.06); }
.filter-sep { font-family: var(--mono); font-size: 10px; color: rgba(232,224,255,0.1); padding: 0 4px; }

/* ── LOADING ── */
#loading { text-align: center; padding: 80px 0; }
.loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--violet); margin: 0 3px;
  animation: bounce 1.2s ease-in-out infinite; }
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.loading-text { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;
  color: rgba(232,224,255,0.25); margin-top: 16px; }

/* ── EMPTY ── */
#empty { display: none; text-align: center; padding: 80px 0; }
.empty-title { font-family: var(--display); font-size: 32px; color: rgba(232,224,255,0.3); margin-bottom: 8px; }
.empty-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: rgba(232,224,255,0.2); }

/* ── GRID ── */
#galaxy-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 2px;
  background: rgba(232,224,255,0.04);
}

/* ── GALAXY CARD ── */
.galaxy-card {
  background: var(--bg);
  padding: 24px;
  display: flex; flex-direction: column; gap: 14px;
  transition: background .15s; cursor: pointer;
  position: relative; overflow: hidden;
  text-decoration: none; color: inherit;
}
.galaxy-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--violet), transparent);
  opacity: 0; transition: opacity .2s;
}
.galaxy-card:hover { background: rgba(123,47,255,0.06); }
.galaxy-card:hover::before { opacity: 1; }

.gc-top { display: flex; align-items: center; gap: 12px; }
.gc-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 13px; font-weight: bold; color: var(--white);
}
.gc-info { flex: 1; min-width: 0; }
.gc-username { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
  color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gc-service { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em;
  color: rgba(232,224,255,0.3); text-transform: uppercase; margin-top: 2px; }
.gc-online { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 6px var(--green); flex-shrink: 0; }

/* Mini planet preview */
.gc-planets {
  display: flex; align-items: center; gap: 5px; height: 20px;
}
.gc-planet { border-radius: 50%; display: block; }

.gc-stats { display: flex; gap: 20px; }
.gc-stat { display: flex; flex-direction: column; gap: 1px; }
.gc-stat-v { font-family: var(--mono); font-size: 14px; letter-spacing: 0.04em; color: var(--white); }
.gc-stat-l { font-family: var(--mono); font-size: 7px; letter-spacing: 0.14em;
  color: rgba(232,224,255,0.3); text-transform: uppercase; }

.gc-date { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em;
  color: rgba(232,224,255,0.2); }

/* ── CARD FOOTER (explore + like) ── */
.gc-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  margin-top: 2px;
}

.gc-explore {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.14em; text-transform: uppercase;
  background: rgba(123,47,255,0.15); border: 1px solid rgba(123,47,255,0.3);
  color: rgba(232,224,255,0.6); transition: .15s;
}
.galaxy-card:hover .gc-explore { background: rgba(123,47,255,0.3); color: var(--white); border-color: var(--violet); }

/* ── LIKE BUTTON ── */
.like-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: transparent; border: 1px solid rgba(232,224,255,0.1);
  color: rgba(232,224,255,0.35); cursor: pointer; transition: .15s;
  flex-shrink: 0;
}
.like-btn:hover { border-color: rgba(191,0,255,0.4); color: var(--magenta); }
.like-btn.liked {
  border-color: rgba(191,0,255,0.5); color: var(--magenta);
  background: rgba(191,0,255,0.08);
}
/* Pulse animation on like */
@keyframes like-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}
.like-btn.pop { animation: like-pop 0.3s ease; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 0; margin-bottom: 28px;
  border-bottom: 1px solid rgba(123,47,255,0.2);
}
.tab-btn {
  padding: 10px 20px; font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  background: transparent; border: none; color: rgba(232,224,255,0.3);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: .15s;
}
.tab-btn:hover { color: rgba(232,224,255,0.6); }
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  main { padding: 32px 20px; }
  nav { padding: 0 20px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo">SOUNDZ</a>
  </div>
  <div class="nav-right" style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
    <span class="nav-user" id="nav-user"></span>
    <a href="profile.html" class="btn-sm btn-outline" id="btn-profile" style="display:none">Mon profil</a>
    <a href="index.html" class="btn-sm btn-fill" id="btn-login" style="display:none">Connexion</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <p class="page-eyebrow">// Communauté</p>
    <h1 class="page-title">GALAXIES PUBLIQUES</h1>
    <p class="page-sub" id="page-sub">// Chargement…</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab-btn active" onclick="switchTab('all', this)">Toutes les galaxies</button>
    <button class="tab-btn" id="tab-following" onclick="switchTab('following', this)" style="display:none">Mes abonnements</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterBy('all', event)">Toutes</button>
    <span class="filter-sep">//</span>
    <button class="filter-btn" onclick="filterBy('apple', event)">Apple Music</button>
    <button class="filter-btn" onclick="filterBy('spotify', event)">Spotify</button>
    <button class="filter-btn" onclick="filterBy('deezer', event)">Deezer</button>
    <button class="filter-btn" onclick="filterBy('soundcloud', event)">SoundCloud</button>
  </div>

  <div id="loading">
    <div>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
    <div class="loading-text">// Chargement des galaxies…</div>
  </div>

  <div id="empty">
    <div class="empty-title">AUCUNE GALAXIE</div>
    <div class="empty-sub">// Sois le premier à partager la tienne</div>
  </div>

  <div id="galaxy-grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const _sb = createClient(
  'https://wsdpaxkjaykxuzexzjqp.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzZHBheGtqYXlreHV6ZXh6anFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODA3NzMsImV4cCI6MjA4OTI1Njc3M30.ZH8gM25abDmP2Mf0zFNBJvf6EU2uIH4Lb-2-kpdlR7I'
);

const COLORS = ['#7B2FFF','#00CFFF','#BF00FF','#D85A30','#1D9E75','#FF2D78','#EF9F27','#378ADD','#639922'];
let allGalaxies = [];
let currentFilter = 'all';
let currentTab = 'all';
let likedIds = new Set();
let followingIds = new Set();
let currentUser = null;

// ── LIKE ──
// FIX 1 : stopPropagation pour ne pas déclencher le lien de la carte
// FIX 2 : mise à jour de likes_count dans Supabase (RPC ou update direct)
async function toggleLike(e, btn, galaxyId) {
  e.preventDefault();
  e.stopPropagation(); // empêche la navigation vers le profil

  if (!currentUser) { window.location.href = 'index.html'; return; }

  // Empêcher le double-clic pendant la requête
  if (btn.dataset.loading === 'true') return;
  btn.dataset.loading = 'true';

  const isLiked = btn.dataset.liked === 'true';
  const countEl = btn.querySelector('.like-count');
  let count = parseInt(countEl.textContent) || 0;

  // Animation pop
  btn.classList.remove('pop');
  void btn.offsetWidth; // reflow pour relancer l'animation
  btn.classList.add('pop');

  if (isLiked) {
    const { error } = await _sb.from('likes').delete()
      .eq('user_id', currentUser.id)
      .eq('galaxy_id', galaxyId);
    if (!error) {
      likedIds.delete(galaxyId);
      btn.dataset.liked = 'false';
      btn.classList.remove('liked');
      countEl.textContent = Math.max(0, count - 1);
      // Décrémenter dans la table galaxies
      await _sb.rpc('decrement_likes', { gid: galaxyId });
    }
  } else {
    const { error } = await _sb.from('likes').insert({
      user_id: currentUser.id,
      galaxy_id: galaxyId
    });
    if (!error) {
      likedIds.add(galaxyId);
      btn.dataset.liked = 'true';
      btn.classList.add('liked');
      countEl.textContent = count + 1;
      // Incrémenter dans la table galaxies
      await _sb.rpc('increment_likes', { gid: galaxyId });
    }
  }

  btn.dataset.loading = 'false';
}

async function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (tab === 'following') {
    if (followingIds.size === 0) { renderGalaxies([]); return; }
    const { data } = await _sb
      .from('galaxies')
      .select('id, artist_count, track_count, service, updated_at, likes_count, user_id')
      .eq('is_public', true)
      .in('user_id', [...followingIds])
      .order('updated_at', { ascending: false });
    if (data && data.length > 0) {
      const uids = [...new Set(data.map(g => g.user_id))];
      const { data: profs } = await _sb.from('profiles').select('id, username, avatar_color').in('id', uids);
      const pm = {}; (profs||[]).forEach(p => pm[p.id] = p);
      renderGalaxies(data.map(g => ({ ...g, profiles: pm[g.user_id] || { username: 'anonymous', avatar_color: '#7B2FFF' } })));
    } else {
      renderGalaxies([]);
    }
  } else {
    filterBy(currentFilter);
  }
}

function getColor(username) {
  return COLORS[username.charCodeAt(0) % COLORS.length];
}

function getInitials(username) {
  return username.slice(0,2).toUpperCase();
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Aujourd\'hui';
  if (days === 1) return 'Hier';
  if (days < 7)  return `Il y a ${days} jours`;
  if (days < 30) return `Il y a ${Math.floor(days/7)} sem.`;
  return `Il y a ${Math.floor(days/30)} mois`;
}

async function init() {
  const { data: { session } } = await _sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    const username = session.user.user_metadata?.username || session.user.email.split('@')[0];
    document.getElementById('nav-user').textContent = '// ' + username.toUpperCase();
    document.getElementById('btn-profile').style.display = 'block';
    // FIX 3 : tab-following affiché une seule fois, après le chargement des follows
  } else {
    document.getElementById('btn-login').style.display = 'block';
  }

  const { data: galaxiesData, error } = await _sb
    .from('galaxies')
    .select('id, artist_count, track_count, service, updated_at, likes_count, user_id')
    .eq('is_public', true)
    .order('updated_at', { ascending: false })
    .limit(50);

  document.getElementById('loading').style.display = 'none';

  if (error || !galaxiesData || galaxiesData.length === 0) {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('page-sub').textContent = '// 0 galaxies publiques';
    return;
  }

  const userIds = [...new Set(galaxiesData.map(g => g.user_id))];
  const { data: profilesData } = await _sb
    .from('profiles')
    .select('id, username, avatar_color')
    .in('id', userIds);

  const profileMap = {};
  (profilesData || []).forEach(p => { profileMap[p.id] = p; });
  const data = galaxiesData.map(g => ({
    ...g,
    profiles: profileMap[g.user_id] || { username: 'anonymous', avatar_color: '#7B2FFF' }
  }));

  allGalaxies = data;
  document.getElementById('page-sub').textContent = `// ${data.length} galaxie${data.length > 1 ? 's' : ''} publique${data.length > 1 ? 's' : ''}`;

  // Charger likes + follows en parallèle
  if (session) {
    const [likesRes, followsRes] = await Promise.all([
      _sb.from('likes').select('galaxy_id').eq('user_id', session.user.id),
      _sb.from('follows').select('following_id').eq('follower_id', session.user.id)
    ]);
    if (likesRes.data) likedIds = new Set(likesRes.data.map(l => l.galaxy_id));
    if (followsRes.data) {
      followingIds = new Set(followsRes.data.map(f => f.following_id));
    }
    // FIX 3 : afficher l'onglet follows ici uniquement, une seule fois
    if (followingIds.size > 0) {
      document.getElementById('tab-following').style.display = 'block';
    }
  }

  renderGalaxies(data);
}

function renderGalaxies(galaxies) {
  const grid = document.getElementById('galaxy-grid');
  grid.innerHTML = '';

  if (galaxies.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';

  galaxies.forEach(g => {
    const username = g.profiles?.username || 'anonymous';
    const color    = g.profiles?.avatar_color || getColor(username);
    const color2   = COLORS[(COLORS.indexOf(color) + 1) % COLORS.length];
    const initials = getInitials(username);

    const planetColors = [color, color2, COLORS[(COLORS.indexOf(color) + 3) % COLORS.length]];
    const planetsHTML = planetColors.map((c, i) =>
      `<span class="gc-planet" style="width:${12 - i*2}px;height:${12 - i*2}px;background:${c};box-shadow:0 0 ${6-i}px ${c}"></span>`
    ).join('');

    // FIX 1 : like button inclus dans la carte, avec stopPropagation
    const isLiked   = likedIds.has(g.id);
    const likeCount = g.likes_count || 0;

    const card = document.createElement('a');
    card.className = 'galaxy-card';
    card.href = `profile.html?user=${encodeURIComponent(username)}`;
    card.innerHTML = `
      <div class="gc-top">
        <div class="gc-avatar" style="background:linear-gradient(135deg,${color},${color2})">${initials}</div>
        <div class="gc-info">
          <div class="gc-username">${username.toUpperCase()}</div>
          <div class="gc-service">${g.service || 'import'}</div>
        </div>
      </div>
      <div class="gc-planets">${planetsHTML}</div>
      <div class="gc-stats">
        <div class="gc-stat">
          <span class="gc-stat-v">${g.artist_count}</span>
          <span class="gc-stat-l">Artistes</span>
        </div>
        <div class="gc-stat">
          <span class="gc-stat-v">${g.track_count?.toLocaleString('fr-FR')}</span>
          <span class="gc-stat-l">Titres</span>
        </div>
      </div>
      <div class="gc-date">// ${timeAgo(g.updated_at)}</div>
      <div class="gc-footer">
        <div class="gc-explore">◎ &nbsp; Explorer cette galaxie</div>
        <button
          class="like-btn${isLiked ? ' liked' : ''}"
          data-liked="${isLiked}"
          data-loading="false"
          title="${isLiked ? 'Retirer le like' : 'Liker cette galaxie'}"
        >♡ <span class="like-count">${likeCount}</span></button>
      </div>
    `;

    // Attacher l'event listener sur le bouton (évite les inline handlers)
    const likeBtn = card.querySelector('.like-btn');
    likeBtn.addEventListener('click', (e) => toggleLike(e, likeBtn, g.id));

    grid.appendChild(card);
  });
}

// FIX 2 : event passé explicitement en paramètre
function filterBy(service, e) {
  currentFilter = service;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (e && e.target) e.target.classList.add('active');

  const filtered = service === 'all'
    ? allGalaxies
    : allGalaxies.filter(g => (g.service || '').toLowerCase().includes(service));

  renderGalaxies(filtered);
}

init();
</script>
</body>
</html>
