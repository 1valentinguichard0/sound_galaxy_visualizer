<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUNDZ — Explorer les galaxies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #06040F; --white: #E8E0FF;
  --violet: #7B2FFF; --cyan: #00CFFF;
  --indigo: #3D00CC; --magenta: #BF00FF;
  --green: #00FF9F;
  --display: 'Bebas Neue', sans-serif;
  --cond: 'Barlow Condensed', sans-serif;
  --mono: 'Share Tech Mono', monospace;
}
body { background: var(--bg); color: var(--white); font-family: var(--cond); min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
  pointer-events: none; z-index: 9998;
}

/* ── NAV ── */
nav {
  height: 56px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 32px;
  border-bottom: 1px solid rgba(123,47,255,0.2);
  background: rgba(6,4,15,0.9); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100; gap: 16px;
}
.nav-left { display: flex; align-items: center; gap: 24px; flex-shrink: 0; }
.nav-logo { font-family: var(--display); font-size: 22px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-decoration: none; }
.nav-right { display: flex; gap: 12px; align-items: center; }
.nav-user { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: rgba(232,224,255,0.4); }
.btn-sm { padding: 6px 16px; font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
  text-decoration: none; transition: .15s; border-radius: 0; }
.btn-outline { background: transparent; border: 1px solid rgba(123,47,255,0.4); color: rgba(232,224,255,0.6); }
.btn-outline:hover { border-color: var(--violet); color: var(--white); }
.btn-fill { background: var(--violet); border: 1px solid var(--violet); color: var(--white); }
.btn-fill:hover { background: #9B4FFF; }

/* ── MAIN ── */
main { max-width: 1200px; margin: 0 auto; padding: 48px 40px; }

/* ── PAGE HEADER ── */
.page-header { margin-bottom: 36px; }
.page-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em;
  color: var(--cyan); text-transform: uppercase; margin-bottom: 8px; }
.page-title { font-family: var(--display); font-size: clamp(36px, 5vw, 64px);
  line-height: 0.9; color: var(--white); margin-bottom: 6px; }
.page-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  color: rgba(232,224,255,0.3); }

/* ── SEARCH BAR ── */
.search-section { margin-bottom: 40px; }
.search-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em;
  color: var(--cyan); text-transform: uppercase; margin-bottom: 10px; display: block;
}
.search-wrap {
  position: relative; display: flex; align-items: center;
  border: 1px solid rgba(123,47,255,0.3); background: rgba(123,47,255,0.04);
  transition: border-color .15s;
}
.search-wrap:focus-within { border-color: rgba(123,47,255,0.7); }
.search-prompt {
  font-family: var(--mono); font-size: 12px; color: rgba(0,207,255,0.5);
  padding: 0 10px 0 14px; flex-shrink: 0;
  animation: blink-caret 1.1s step-end infinite;
}
@keyframes blink-caret { 0%,100%{opacity:1} 50%{opacity:0} }
#profile-search {
  flex: 1; background: transparent; border: none; padding: 11px 0;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  color: var(--white); outline: none; text-transform: uppercase;
  caret-color: var(--cyan);
}
#profile-search::placeholder { color: rgba(232,224,255,0.15); }
.search-clear {
  padding: 0 14px; font-family: var(--mono); font-size: 10px;
  color: rgba(232,224,255,0.2); cursor: pointer; display: none;
  transition: color .15s; background: none; border: none;
}
.search-clear:hover { color: var(--magenta); }

#search-results {
  position: absolute; top: calc(100% + 2px); left: -1px; right: -1px;
  background: rgba(6,4,15,0.98); border: 1px solid rgba(123,47,255,0.4);
  border-top: none; z-index: 200; display: none;
  max-height: 320px; overflow-y: auto;
}
#search-results.open { display: block; }
.sr-header {
  padding: 7px 14px 5px;
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.14em;
  color: rgba(232,224,255,0.2); border-bottom: 1px solid rgba(123,47,255,0.15);
}
.sr-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(123,47,255,0.07);
  transition: background .1s; text-decoration: none; color: inherit;
}
.sr-item:hover { background: rgba(123,47,255,0.1); }
.sr-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: bold;
}
.sr-info { flex: 1; min-width: 0; }
.sr-username { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  color: var(--white); text-transform: uppercase; }
.sr-item:hover .sr-username { color: var(--cyan); }
.sr-sub { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em;
  color: rgba(232,224,255,0.3); margin-top: 2px; }
.sr-arrow { font-size: 10px; color: rgba(232,224,255,0.2); }
.sr-empty {
  padding: 20px 14px; font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.12em; color: rgba(232,224,255,0.25); text-align: center;
}
.sr-loading {
  padding: 16px 14px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.14em; color: rgba(0,207,255,0.4); text-align: center;
  animation: blink-caret 1s step-end infinite;
}

/* ── DIVIDER ── */
.section-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.section-divider-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em;
  color: var(--cyan); text-transform: uppercase; white-space: nowrap; }
.section-divider-line { flex: 1; height: 1px; background: rgba(123,47,255,0.2); }

/* ── TABS ── */
.tabs { display: flex; margin-bottom: 28px; border-bottom: 1px solid rgba(123,47,255,0.2); }
.tab-btn {
  padding: 10px 20px; font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  background: transparent; border: none; color: rgba(232,224,255,0.3);
  cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: .15s;
}
.tab-btn:hover { color: rgba(232,224,255,0.6); }
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

/* ── FILTERS ── */
.filters { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  padding: 6px 16px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.14em; text-transform: uppercase;
  background: transparent; border: 1px solid rgba(232,224,255,0.12);
  color: rgba(232,224,255,0.4); cursor: pointer; transition: .15s;
}
.filter-btn:hover { border-color: rgba(123,47,255,0.5); color: rgba(232,224,255,0.7); }
.filter-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,207,255,0.06); }
.filter-sep { font-family: var(--mono); font-size: 10px; color: rgba(232,224,255,0.1); padding: 0 4px; }

/* ── LOADING / EMPTY ── */
#loading { text-align: center; padding: 80px 0; }
.loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--violet); margin: 0 3px; animation: bounce 1.2s ease-in-out infinite; }
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.loading-text { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;
  color: rgba(232,224,255,0.25); margin-top: 16px; }
#empty { display: none; text-align: center; padding: 80px 0; }
.empty-title { font-family: var(--display); font-size: 32px; color: rgba(232,224,255,0.3); margin-bottom: 8px; }
.empty-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: rgba(232,224,255,0.2); }

/* ── GRID ── */
#galaxy-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 2px; background: rgba(232,224,255,0.04);
}

/* ── GALAXY CARD ── */
.galaxy-card {
  background: var(--bg); padding: 24px;
  display: flex; flex-direction: column; gap: 14px;
  transition: background .15s; cursor: pointer;
  position: relative; overflow: hidden;
  text-decoration: none; color: inherit;
}
.galaxy-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--violet), transparent);
  opacity: 0; transition: opacity .2s;
}
.galaxy-card:hover { background: rgba(123,47,255,0.06); }
.galaxy-card:hover::before { opacity: 1; }

.gc-top { display: flex; align-items: center; gap: 12px; }
.gc-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 13px; font-weight: bold; color: var(--white);
}
.gc-info { flex: 1; min-width: 0; }
.gc-username { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
  color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gc-service { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em;
  color: rgba(232,224,255,0.3); text-transform: uppercase; margin-top: 2px; }
.gc-planets { display: flex; align-items: center; gap: 5px; height: 20px; }
.gc-planet { border-radius: 50%; display: block; }
.gc-stats { display: flex; gap: 20px; }
.gc-stat { display: flex; flex-direction: column; gap: 1px; }
.gc-stat-v { font-family: var(--mono); font-size: 14px; letter-spacing: 0.04em; color: var(--white); }
.gc-stat-l { font-family: var(--mono); font-size: 7px; letter-spacing: 0.14em;
  color: rgba(232,224,255,0.3); text-transform: uppercase; }
.gc-date { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; color: rgba(232,224,255,0.2); }
.gc-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 2px; }
.gc-explore {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.14em; text-transform: uppercase;
  background: rgba(123,47,255,0.15); border: 1px solid rgba(123,47,255,0.3);
  color: rgba(232,224,255,0.6); transition: .15s;
}
.galaxy-card:hover .gc-explore { background: rgba(123,47,255,0.3); color: var(--white); border-color: var(--violet); }

/* ── LIKE BUTTON ── */
.like-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: transparent; border: 1px solid rgba(232,224,255,0.1);
  color: rgba(232,224,255,0.35); cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
  flex-shrink: 0;
}
.like-btn:hover { border-color: rgba(191,0,255,0.4); color: var(--magenta); }
.like-btn.liked { border-color: rgba(191,0,255,0.5); color: var(--magenta); background: rgba(191,0,255,0.08); }
.like-btn:disabled { opacity: 0.5; cursor: not-allowed; }
@keyframes like-pop { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 100%{transform:scale(1)} }
.like-btn.pop { animation: like-pop 0.25s ease; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  main { padding: 32px 20px; }
  nav { padding: 0 20px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo">SOUNDZ</a>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <a href="profile.html" class="btn-sm btn-outline" id="btn-profile" style="display:none">Mon profil</a>
    <a href="index.html" class="btn-sm btn-fill" id="btn-login" style="display:none">Connexion</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <p class="page-eyebrow">// Communauté</p>
    <h1 class="page-title">EXPLORER</h1>
    <p class="page-sub" id="page-sub">// Chargement…</p>
  </div>

  <!-- ── RECHERCHE PROFILS ── -->
  <div class="search-section">
    <span class="search-label">// Rechercher un profil</span>
    <div class="search-wrap">
      <span class="search-prompt">&gt;_</span>
      <input type="text" id="profile-search" placeholder="ENTRER UN PSEUDO…" autocomplete="off" spellcheck="false">
      <button class="search-clear" id="search-clear" title="Effacer">✕</button>
      <div id="search-results">
        <div class="sr-header">// RÉSULTATS</div>
        <div id="sr-body"></div>
      </div>
    </div>
  </div>

  <!-- ── GALAXIES ── -->
  <div class="section-divider">
    <span class="section-divider-label">// Galaxies publiques</span>
    <div class="section-divider-line"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('all', this)">Toutes les galaxies</button>
    <button class="tab-btn" id="tab-following" onclick="switchTab('following', this)" style="display:none">Mes abonnements</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterBy('all', this)">Toutes</button>
    <span class="filter-sep">//</span>
    <button class="filter-btn" onclick="filterBy('apple', this)">Apple Music</button>
    <button class="filter-btn" onclick="filterBy('spotify', this)">Spotify</button>
    <button class="filter-btn" onclick="filterBy('deezer', this)">Deezer</button>
    <button class="filter-btn" onclick="filterBy('soundcloud', this)">SoundCloud</button>
  </div>

  <div id="loading">
    <div>
      <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
    </div>
    <div class="loading-text">// Chargement des galaxies…</div>
  </div>

  <div id="empty">
    <div class="empty-title">AUCUNE GALAXIE</div>
    <div class="empty-sub">// Sois le premier à partager la tienne</div>
  </div>

  <div id="galaxy-grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const _sb = createClient(
  'https://wsdpaxkjaykxuzexzjqp.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzZHBheGtqYXlreHV6ZXh6anFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODA3NzMsImV4cCI6MjA4OTI1Njc3M30.ZH8gM25abDmP2Mf0zFNBJvf6EU2uIH4Lb-2-kpdlR7I'
);

const COLORS = ['#7B2FFF','#00CFFF','#BF00FF','#D85A30','#1D9E75','#FF2D78','#EF9F27','#378ADD','#639922'];

let allGalaxies   = [];
let currentFilter = 'all';
let currentTab    = 'all';
let currentUser   = null;
let followingIds  = new Set();

// ─────────────────────────────────────────────
// LIKES — Source de vérité = table `likes`
// likeCounts : { [galaxyId]: number }  chargé via COUNT côté client
// likedIds   : Set<galaxyId>           ce que l'utilisateur courant a liké
// ─────────────────────────────────────────────
const likedIds   = new Set();
const likeCounts = {};

async function fetchLikeCounts(galaxyIds) {
  // Charge toutes les lignes likes pour ces galaxies,
  // compte côté JS — pas besoin de GROUP BY SQL
  if (!galaxyIds.length) return;
  galaxyIds.forEach(id => { likeCounts[id] = 0; }); // initialiser à 0
  const { data } = await _sb
    .from('likes')
    .select('galaxy_id')
    .in('galaxy_id', galaxyIds);
  if (data) data.forEach(row => {
    likeCounts[row.galaxy_id] = (likeCounts[row.galaxy_id] || 0) + 1;
  });
}

async function fetchUserLikes(galaxyIds) {
  if (!currentUser || !galaxyIds.length) return;
  const { data } = await _sb
    .from('likes')
    .select('galaxy_id')
    .eq('user_id', currentUser.id)
    .in('galaxy_id', galaxyIds);
  if (data) data.forEach(row => likedIds.add(row.galaxy_id));
}

async function toggleLike(e, btn, galaxyId) {
  e.preventDefault();
  e.stopPropagation(); // ne pas déclencher le lien <a> de la carte

  if (!currentUser) { window.location.href = 'index.html'; return; }
  if (btn.disabled) return;
  btn.disabled = true;

  // Animation pop
  btn.classList.remove('pop');
  void btn.offsetWidth; // reflow
  btn.classList.add('pop');

  const isLiked = likedIds.has(galaxyId);
  const countEl = btn.querySelector('.like-count');

if (isLiked) {
  const { error } = await _sb.from('likes').delete()
    .eq('user_id', currentUser.id)
    .eq('galaxy_id', galaxyId);
  if (!error) {
    likedIds.delete(galaxyId);
    likeCounts[galaxyId] = Math.max(0, (likeCounts[galaxyId] || 1) - 1);
    btn.classList.remove('liked');
    btn.title = 'Liker cette galaxie';
    countEl.textContent = likeCounts[galaxyId];
    _sb.rpc('decrement_likes', { gid: galaxyId }); // ← remplacé
  }
} else {
  const { error } = await _sb.from('likes').insert({
    user_id: currentUser.id,
    galaxy_id: galaxyId
  });
  if (!error) {
    likedIds.add(galaxyId);
    likeCounts[galaxyId] = (likeCounts[galaxyId] || 0) + 1;
    btn.classList.add('liked');
    btn.title = 'Retirer le like';
    countEl.textContent = likeCounts[galaxyId];
    _sb.rpc('increment_likes', { gid: galaxyId }); // ← remplacé
  }
}

  btn.disabled = false;
}

// ─────────────────────────────────────────────
// RECHERCHE PROFILS
// ─────────────────────────────────────────────
let searchTimeout = null;
const searchInput   = document.getElementById('profile-search');
const searchResults = document.getElementById('search-results');
const srBody        = document.getElementById('sr-body');
const clearBtn      = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearBtn.style.display = q ? 'block' : 'none';
  if (!q) { searchResults.classList.remove('open'); srBody.innerHTML = ''; return; }
  clearTimeout(searchTimeout);
  srBody.innerHTML = '<div class="sr-loading">// Recherche en cours…</div>';
  searchResults.classList.add('open');
  searchTimeout = setTimeout(() => searchProfiles(q), 300);
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  searchResults.classList.remove('open');
  srBody.innerHTML = '';
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.classList.remove('open');
});

async function searchProfiles(q) {
  const { data, error } = await _sb
    .from('profiles')
    .select('id, username, avatar_color')
    .ilike('username', `%${q}%`)   // insensible à la casse
    .limit(8);

  srBody.innerHTML = '';

  if (error || !data || data.length === 0) {
    srBody.innerHTML = `<div class="sr-empty">// Aucun profil pour "${q.toUpperCase()}"</div>`;
    return;
  }

  // Récupérer les stats galaxie publique de ces profils
  const uids = data.map(p => p.id);
  const { data: galaxies } = await _sb
    .from('galaxies')
    .select('user_id, artist_count, track_count')
    .in('user_id', uids)
    .eq('is_public', true);

  const galMap = {};
  if (galaxies) galaxies.forEach(g => { galMap[g.user_id] = g; });

  data.forEach(profile => {
    const username = profile.username || 'anonymous';
    const color    = profile.avatar_color || COLORS[username.charCodeAt(0) % COLORS.length];
    const color2   = COLORS[(COLORS.indexOf(color) + 1) % COLORS.length];
    const initials = username.slice(0, 2).toUpperCase();
    const gal      = galMap[profile.id];

    const item = document.createElement('a');
    item.className = 'sr-item';
    item.href = `profile.html?user=${encodeURIComponent(username)}`;
    item.innerHTML = `
      <div class="sr-avatar" style="background:linear-gradient(135deg,${color},${color2})">${initials}</div>
      <div class="sr-info">
        <div class="sr-username">${username.toUpperCase()}</div>
        <div class="sr-sub">${gal
          ? `${gal.artist_count} artistes · ${gal.track_count?.toLocaleString('fr-FR')} titres`
          : '// Galaxie privée ou inexistante'
        }</div>
      </div>
      <span class="sr-arrow">→</span>
    `;
    srBody.appendChild(item);
  });
}

// ─────────────────────────────────────────────
// TABS & FILTERS
// ─────────────────────────────────────────────
async function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (tab === 'following') {
    if (followingIds.size === 0) { renderGalaxies([]); return; }
    const { data } = await _sb
      .from('galaxies')
      .select('id, artist_count, track_count, service, updated_at, user_id')
      .eq('is_public', true)
      .in('user_id', [...followingIds])
      .order('updated_at', { ascending: false });

    if (data && data.length > 0) {
      const uids = [...new Set(data.map(g => g.user_id))];
      const { data: profs } = await _sb.from('profiles').select('id, username, avatar_color').in('id', uids);
      const pm = {}; (profs||[]).forEach(p => pm[p.id] = p);
      const enriched = data.map(g => ({ ...g, profiles: pm[g.user_id] || { username: 'anonymous', avatar_color: '#7B2FFF' } }));
      await fetchLikeCounts(data.map(g => g.id));
      renderGalaxies(enriched);
    } else {
      renderGalaxies([]);
    }
  } else {
    filterBy(currentFilter);
  }
}

function filterBy(service, btnEl) {
  currentFilter = service;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  const filtered = service === 'all'
    ? allGalaxies
    : allGalaxies.filter(g => (g.service || '').toLowerCase().includes(service));
  renderGalaxies(filtered);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function getColor(u) { return COLORS[u.charCodeAt(0) % COLORS.length]; }
function getInitials(u) { return u.slice(0,2).toUpperCase(); }
function timeAgo(d) {
  const days = Math.floor((Date.now() - new Date(d)) / 86400000);
  if (days === 0) return 'Aujourd\'hui';
  if (days === 1) return 'Hier';
  if (days < 7)  return `Il y a ${days} jours`;
  if (days < 30) return `Il y a ${Math.floor(days/7)} sem.`;
  return `Il y a ${Math.floor(days/30)} mois`;
}

function renderGalaxies(galaxies) {
  const grid = document.getElementById('galaxy-grid');
  grid.innerHTML = '';

  if (!galaxies.length) {
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';

  galaxies.forEach(g => {
    const username = g.profiles?.username || 'anonymous';
    const color    = g.profiles?.avatar_color || getColor(username);
    const color2   = COLORS[(COLORS.indexOf(color) + 1) % COLORS.length];
    const initials = getInitials(username);

    const planetColors = [color, color2, COLORS[(COLORS.indexOf(color) + 3) % COLORS.length]];
    const planetsHTML  = planetColors.map((c, i) =>
      `<span class="gc-planet" style="width:${12-i*2}px;height:${12-i*2}px;background:${c};box-shadow:0 0 ${6-i}px ${c}"></span>`
    ).join('');

    // Utilise likeCounts (source de vérité) ; fallback sur likes_count de la BDD
    const count   = likeCounts.hasOwnProperty(g.id) ? likeCounts[g.id] : (g.likes_count || 0);
    const isLiked = likedIds.has(g.id);

    const card = document.createElement('a');
    card.className = 'galaxy-card';
    card.href = `profile.html?user=${encodeURIComponent(username)}`;
    card.innerHTML = `
      <div class="gc-top">
        <div class="gc-avatar" style="background:linear-gradient(135deg,${color},${color2})">${initials}</div>
        <div class="gc-info">
          <div class="gc-username">${username.toUpperCase()}</div>
          <div class="gc-service">${g.service || 'import'}</div>
        </div>
      </div>
      <div class="gc-planets">${planetsHTML}</div>
      <div class="gc-stats">
        <div class="gc-stat"><span class="gc-stat-v">${g.artist_count}</span><span class="gc-stat-l">Artistes</span></div>
        <div class="gc-stat"><span class="gc-stat-v">${g.track_count?.toLocaleString('fr-FR')}</span><span class="gc-stat-l">Titres</span></div>
      </div>
      <div class="gc-date">// ${timeAgo(g.updated_at)}</div>
      <div class="gc-footer">
        <div class="gc-explore">◎ &nbsp; Explorer cette galaxie</div>
        <button
          class="like-btn${isLiked ? ' liked' : ''}"
          title="${isLiked ? 'Retirer le like' : 'Liker cette galaxie'}"
        >♡ <span class="like-count">${count}</span></button>
      </div>
    `;

    card.querySelector('.like-btn').addEventListener('click', e =>
      toggleLike(e, card.querySelector('.like-btn'), g.id)
    );

    grid.appendChild(card);
  });
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
async function init() {
  const { data: { session } } = await _sb.auth.getSession();

  if (session) {
    currentUser = session.user;
    const username = session.user.user_metadata?.username || session.user.email.split('@')[0];
    document.getElementById('nav-user').textContent = '// ' + username.toUpperCase();
    document.getElementById('btn-profile').style.display = 'block';
  } else {
    document.getElementById('btn-login').style.display = 'block';
  }

  const { data: galaxiesData, error } = await _sb
    .from('galaxies')
    .select('id, artist_count, track_count, service, updated_at, likes_count, user_id')
    .eq('is_public', true)
    .order('updated_at', { ascending: false })
    .limit(50);

  document.getElementById('loading').style.display = 'none';

  if (error || !galaxiesData || !galaxiesData.length) {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('page-sub').textContent = '// 0 galaxies publiques';
    return;
  }

  const userIds = [...new Set(galaxiesData.map(g => g.user_id))];
  const { data: profilesData } = await _sb
    .from('profiles').select('id, username, avatar_color').in('id', userIds);
  const profileMap = {};
  (profilesData || []).forEach(p => { profileMap[p.id] = p; });

  allGalaxies = galaxiesData.map(g => ({
    ...g,
    profiles: profileMap[g.user_id] || { username: 'anonymous', avatar_color: '#7B2FFF' }
  }));

  document.getElementById('page-sub').textContent =
    `// ${allGalaxies.length} galaxie${allGalaxies.length > 1 ? 's' : ''} publique${allGalaxies.length > 1 ? 's' : ''}`;

  const galaxyIds = allGalaxies.map(g => g.id);

  // Tout en parallèle : vrais compteurs + likes utilisateur + follows
  await Promise.all([
    fetchLikeCounts(galaxyIds),
    fetchUserLikes(galaxyIds),
    (async () => {
      if (!session) return;
      const { data } = await _sb.from('follows')
        .select('following_id').eq('follower_id', session.user.id);
      if (data) {
        followingIds = new Set(data.map(f => f.following_id));
        if (followingIds.size > 0)
          document.getElementById('tab-following').style.display = 'block';
      }
    })()
  ]);

  renderGalaxies(allGalaxies);
}

init();
</script>
